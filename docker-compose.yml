version: '3.8'

services:
  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: production_webapp
    restart: always
    networks:
      - lab_network

  nginx:
    image: nginx:alpine
    container_name: production_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - juiceshop
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - lab_network

  loki:
    image: grafana/loki:2.9.0
    container_name: lab_log_engine
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - lab_network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: lab_log_shipper
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - lab_network

  grafana:
    image: grafana/grafana:latest
    container_name: lab_dashboard
    ports:
      - "4000:3000"  # Maps host port 4000 to internal Grafana port 3000
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://${PI_IP_ADDRESS}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - loki
    networks:
      - lab_network

networks:
  lab_network:
    driver: bridge
